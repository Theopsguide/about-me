name: Deploy to GitHub Pages

on:
  push:
    branches: [ master, main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Stage site files (exclude internal docs)
        run: |
          mkdir -p /tmp/site
          rsync -a --exclude '.git' --exclude '.github' --exclude 'docs' --exclude '.gitignore' ./ /tmp/site/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '/tmp/site'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4