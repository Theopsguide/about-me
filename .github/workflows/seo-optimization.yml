name: SEO and Content Validation

on:
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

concurrency:
  group: seo-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check required SEO elements
        run: |
          fail=0
          grep -q 'meta name="description"' index.html || { echo "::error::Meta description missing in index.html"; fail=1; }
          grep -q 'application/ld+json' index.html || { echo "::error::Structured data missing in index.html"; fail=1; }
          grep -q 'rel="canonical"' index.html || { echo "::error::Canonical link missing in index.html"; fail=1; }
          test -f sitemap.xml || { echo "::error::sitemap.xml missing"; fail=1; }
          test -f robots.txt || { echo "::error::robots.txt missing"; fail=1; }
          exit $fail

      - name: Check sitemap URLs point to existing files
        run: |
          base="https://theopsguide.github.io/about-me/"
          fail=0
          for loc in $(grep -o '<loc>[^<]*</loc>' sitemap.xml | sed 's|<loc>||;s|</loc>||'); do
            case "$loc" in
              "$base"*) path="${loc#$base}" ;;
              *) echo "::warning::sitemap.xml contains non-site URL, skipping: $loc"; continue ;;
            esac
            [ -z "$path" ] && continue
            f="${path%/}"
            if [ -e "$f" ] || [ -e "$f/index.html" ]; then
              case "$loc" in
                */) [ -e "$f/index.html" ] || { echo "::error::sitemap.xml directory URL has no index.html: $loc"; fail=1; } ;;
              esac
            else
              echo "::error::sitemap.xml references missing file: $loc"
              fail=1
            fi
          done
          exit $fail

      - name: Check for broken links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose --no-progress --exclude-path docs
            --exclude 'linkedin\.com' --exclude 'youtube\.com'
            './**/*.md' './**/*.html'
          fail: true
