# GitHub Pages Configuration for Luke Thompson Profile

# Site Settings
title: "Luke Thompson - Fractional Chief AI Officer (CAIO)"
description: "Luke Thompson is a fractional Chief AI Officer and co-founder of The Ops Guide, helping CEOs turn AI into ROI through strategy, automation, operating systems, and practical implementation."
url: "https://theopsguide.github.io"
baseurl: "/about-me"

# Author Information
author:
  name: "Luke Thompson"
  email: "luke@theoperationsguide.com"
  bio: "Fractional Chief AI Officer (CAIO) | Co-Founder, The Ops Guide | AI strategy, automation, and operating systems for growing teams"
  location: "Johnson City, Tennessee, USA"
  links:
    - label: "The Ops Guide"
      icon: "fas fa-fw fa-building"
      url: "https://www.theopsguide.com/"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/lukeathompson/"
    - label: "TEDx Talk"
      icon: "fab fa-fw fa-youtube"
      url: "https://www.youtube.com/watch?v=KvHIs3Z6W30"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/theopsguide"

# Theme and Plugins
theme: minima
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# SEO Plugin Configuration
seo:
  name: "Luke Thompson"
  title: "Luke Thompson - Fractional Chief AI Officer (CAIO)"
  description: "Fractional Chief AI Officer and co-founder of The Ops Guide helping CEOs and leadership teams turn AI into ROI through AI strategy, workflow automation, operating systems, internal tools, roadmaps, and adoption planning."
  url: "https://theopsguide.github.io/about-me"
  logo: "/about-me/images/luke-thompson-profile.png"
  social:
    - "https://www.linkedin.com/in/lukeathompson/"
    - "https://www.theopsguide.com/"
    - "https://github.com/theopsguide"
    - "https://www.youtube.com/watch?v=KvHIs3Z6W30"

# Social Media
linkedin:
  username: "lukeathompson"

# Site Navigation
navigation:
  - title: "About"
    url: "/"
  - title: "Selected Work"
    url: "/THE-OPERATIONS-GUIDE-CASE-STUDIES"
  - title: "AI Framework"
    url: "/AI-IMPLEMENTATION-FRAMEWORK-2025"
  - title: "The Ops Guide"
    url: "https://www.theopsguide.com/"

# Content Settings
show_excerpts: true

# Markdown Settings
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false

# Sass Settings
sass:
  style: compressed

# Exclude from Processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - README.md
  - docs/

# Include
include:
  - _pages

# Collections
collections:
  articles:
    output: true
    permalink: /:collection/:name/

# Default Front Matter
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Luke Thompson"
  - scope:
      path: ""
      type: "articles"
    values:
      layout: "article"
      author: "Luke Thompson"

# Custom Variables
expertise_areas:
  - "Fractional Chief AI Officer (CAIO)"
  - "AI strategy and implementation roadmaps"
  - "Business operations and operating systems"
  - "Workflow automation and internal tools"
  - "AI readiness assessments and governance"
  - "Executive advisory and change management"
  - "Visual effects and creative technology"

achievements:
  - "Co-Founder of The Ops Guide"
  - "Fractional Chief AI Officer for growing teams"
  - "TEDx Speaker on AI and adaptability"
  - "Former ActionVFX part-owner, COO, and CMO"
  - "Visual Effects Society Member"
  - "Certified Scrum Product Owner and Certified Agile Leadership Essentials"

# Contact Information
contact:
  email: "luke@theoperationsguide.com"
  address: "Johnson City, Tennessee, USA"
  website: "https://www.theopsguide.com/"
  linkedin: "https://www.linkedin.com/in/lukeathompson/"
